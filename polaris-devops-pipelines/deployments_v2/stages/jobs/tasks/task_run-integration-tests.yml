parameters:
  - name: project
    type: string
  - name: arguments
    type: string

steps:
  
  - task: NuGetAuthenticate@1
    displayName: 'Authenticate to NuGet Feed'
    
  - task: DotNetCoreCLI@2
    inputs:
      command: "test"
      projects: ${{ parameters.project }}
      arguments: ${{ parameters.arguments }}
    displayName: "Run integration tests"